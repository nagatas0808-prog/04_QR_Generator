<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード作成 - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <style>
        body {
            background-color: #efefef;
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 750px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 15px;
        }

        h1 {
            color: #ffffff;
            background-color: #0080c0;
            padding: 5px;
            font-size: 20px;
            text-align: center;
            margin: -15px -15px 15px -15px;
        }

        table.layout {
            width: 100%;
            border-collapse: collapse;
        }

        table.layout td {
            border: 1px solid #cccccc;
            padding: 10px;
        }

        .label {
            background-color: #f0f0f0;
            font-weight: bold;
            width: 150px;
            font-size: 13px;
        }

        .tabs button {
            margin-right: 5px;
            padding: 2px 10px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #999;
            background-color: #ddd;
        }

        .tabs button.active {
            background-color: #fff;
            border-bottom: 2px solid #fff;
            font-weight: bold;
            margin-bottom: -1px;
            position: relative;
            z-index: 10;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid #999;
            padding: 3px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-gen {
            background-color: #004080;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 20px;
            border: 2px outset #ffffff;
            cursor: pointer;
        }

        .btn-gen:active {
            border: 2px inset #ffffff;
        }

        .result-area {
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
            border: 1px inset #fff;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px dotted #999999;
            padding-top: 10px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📲 QRコード作成 (QR Generator)</h1>

        <div id="root"></div>

        <div class="footer">
            [ <a href="../00_Portal/index.html">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const App = () => {
            const [mode, setMode] = React.useState('url');
            const [url, setUrl] = React.useState('');
            const [text, setText] = React.useState('');
            const [qrImage, setQrImage] = React.useState(null);

            const generate = async () => {
                const data = mode === 'url' ? url : text;
                if (!data.trim()) { alert('入力してください'); return; }
                try {
                    const dataUrl = await QRCode.toDataURL(data, { width: 300, margin: 2 });
                    setQrImage(dataUrl);
                } catch (err) {
                    alert('失敗: ' + err.message);
                }
            };

            return (
                <div>
                    <div class="tabs" style={{ marginBottom: '10px' }}>
                        <button class={mode === 'url' ? 'active' : ''} onClick={() => setMode('url')}>URL変換</button>
                        <button class={mode === 'text' ? 'active' : ''} onClick={() => setMode('text')}>テキスト変換</button>
                    </div>

                    <table class="layout">
                        <tr>
                            <td class="label">{mode === 'url' ? 'サイトのURL' : 'テキスト'}</td>
                            <td>
                                {mode === 'url' ? (
                                    <input type="text" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="http://..." />
                                ) : (
                                    <textarea value={text} onChange={(e) => setText(e.target.value)} rows="3" placeholder="文章を入力..."></textarea>
                                )}
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style={{ textAlign: 'center' }}>
                                <button class="btn-gen" onClick={generate}>QRコードを生成！</button>
                            </td>
                        </tr>
                    </table>

                    {qrImage && (
                        <div class="result-area" style={{ marginTop: '20px' }}>
                            <div style={{ fontWeight: 'bold', marginBottom: '10px', fontSize: '14px' }}>生成されたQRコード</div>
                            <img src={qrImage} style={{ border: '1px solid #ccc', backgroundColor: '#fff', padding: '10px' }} />
                            <br /><br />
                            <a href={qrImage} download="qrcode.png">
                                <button style={{ cursor: 'pointer' }}>💾 画像を保存する</button>
                            </a>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
